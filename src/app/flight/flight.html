<section class="flight-hero text-white d-flex align-items-center">

  <div class="container">

    <div class="text-center mb-5" data-aos="fade-up">
      <h1 class="fw-bold display-4">
        Book Flights Effortlessly
      </h1>
      <p class="lead">Search, compare & book flights in seconds</p>
    </div>

    <!-- SEARCH BOX -->
    <div class="flight-search-card mx-auto" data-aos="zoom-in">

      <div class="row g-3">

        <div class="col-md-3">
          <input class="form-control" placeholder="From (DEL)">
        </div>

        <div class="col-md-3">
          <input class="form-control" placeholder="To (DXB)">
        </div>

        <div class="col-md-3">
          <input type="date" class="form-control">
        </div>

        <div class="col-md-3">
          <button class="btn btn-primary w-100 rounded-pill">
            Search Flights
          </button>
        </div>

      </div>

    </div>

  </div>

</section>

<section class="py-5">
  <div class="container">

    <h2 class="fw-bold mb-4 text-center" data-aos="fade-up">
      Popular Destinations
    </h2>

    <div class="row g-4">

      <div class="col-md-4" data-aos="zoom-in">
        <div class="destination-card">
          <img src="../../assets/image7.jpg" class="img-fluid">
          <div class="overlay">
            <h5>Dubai</h5>
          </div>
        </div>
      </div>

      <div class="col-md-4" data-aos="zoom-in">
        <div class="destination-card">
          <img src="../../assets/image1.jpg" class="img-fluid">
          <div class="overlay">
            <h5>London</h5>
          </div>
        </div>
      </div>

      <div class="col-md-4" data-aos="zoom-in">
        <div class="destination-card">
          <img src="../../assets/image2.jpg" class="img-fluid">
          <div class="overlay">
            <h5>Bali</h5>
          </div>
        </div>
      </div>

    </div>

  </div>
</section>

<section class="py-5 bg-light">
  <div class="container">

    <h2 class="fw-bold mb-4 text-center">Available Flights</h2>

    <div class="flight-card" data-aos="fade-up">

      <div class="row align-items-center">

        <div class="col-md-3">
          <h5>IndiGo</h5>
          <small>DEL → DXB</small>
        </div>

        <div class="col-md-3">
          <h6>10:30 AM</h6>
          <small>Direct</small>
        </div>

        <div class="col-md-3">
          <h5>₹12,500</h5>
        </div>

        <div class="col-md-3 text-end">
          <button class="btn btn-primary rounded-pill">
            Book Now
          </button>
        </div>

      </div>

    </div>

  </div>
</section>

<section class="stats-section text-white text-center">
  <div class="container py-5">

    <div class="row">

      <div class="col-md-3">
        <h2 class="counter" data-target="500">0</h2>
        <p>Airlines</p>
      </div>

      <div class="col-md-3">
        <h2 class="counter" data-target="1000000">0</h2>
        <p>Bookings</p>
      </div>

      <div class="col-md-3">
        <h2 class="counter" data-target="24">0</h2>
        <p>Support</p>
      </div>

      <div class="col-md-3">
        <h2 class="counter" data-target="99">0</h2>
        <p>Satisfaction</p>
      </div>

    </div>

  </div>
</section>

<section class="cta-section text-white text-center">
  <div class="container">

    <h2 class="fw-bold">Ready to Book Your Next Flight?</h2>
    <p>Get the best deals instantly</p>

    <button class="btn btn-light rounded-pill px-5">
      Search Flights
    </button>

  </div>
</section>
