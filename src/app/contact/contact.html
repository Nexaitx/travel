<section class="contact-hero d-flex align-items-center text-white">

  <div class="container text-center">

    <h1 class="fw-bold display-4" data-aos="fade-up">
      Let’s Talk
    </h1>

    <p class="lead" data-aos="fade-up">
      Have questions? We’re here to help you grow
    </p>

  </div>

</section>

<section class="contact-section py-5">
  <div class="container">

    <div class="row g-5">

      <!-- LEFT: CONTACT INFO -->
      <div class="col-md-5" data-aos="fade-right">

        <h3 class="fw-bold mb-4">Get in Touch</h3>

        <div class="contact-card">
          <i class="fas fa-phone"></i>
          <div>
            <h6>Phone</h6>
            <p>+91 99999 99999</p>
          </div>
        </div>

        <div class="contact-card">
          <i class="fas fa-envelope"></i>
          <div>
            <h6>Email</h6>
            <p>info@example.com</p>
          </div>
        </div>

        <div class="contact-card">
          <i class="fas fa-map-marker-alt"></i>
          <div>
            <h6>Location</h6>
            <p>India</p>
          </div>
        </div>

      </div>

      <!-- RIGHT: FORM -->
      <div class="col-md-7" data-aos="fade-left">

        <form class="contact-form">

          <div class="form-floating mb-3">
            <input type="text" class="form-control" placeholder="Name">
            <label>Your Name</label>
          </div>

          <div class="form-floating mb-3">
            <input type="email" class="form-control" placeholder="Email">
            <label>Email Address</label>
          </div>

          <div class="form-floating mb-3">
            <textarea class="form-control" style="height:120px" placeholder="Message"></textarea>
            <label>Your Message</label>
          </div>

          <button class="btn btn-primary w-100 rounded-pill">
            Send Message
          </button>

        </form>

      </div>

    </div>

  </div>
</section>

<section class="map-section">

  <iframe 
    src="https://maps.google.com/maps?q=india&t=&z=13&ie=UTF8&iwloc=&output=embed"
    width="100%" height="400" style="border:0;">
  </iframe>

</section>

<section class="cta-strip text-center">

  <div class="container">

    <h4 class="fw-bold">Need Immediate Help?</h4>
    <button class="btn btn-outline-primary rounded-pill mt-2">
      Chat on WhatsApp
    </button>

  </div>

</section>
